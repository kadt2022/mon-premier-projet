name: CI Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Rendre gradlew exécutable
        run: chmod +x ./gradlew

      - name: Compilation
        run: ./gradlew clean assemble

      - name: Tests
        run: ./gradlew test

      - name: Construire le jar
        run: ./gradlew jar

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  smoke-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: Démarrer l'application
        run: |
          java -jar build/libs/*.jar > app.log 2>&1 &
          echo $! > app.pid

      - name: Attendre que l'application démarre
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/api/ui/bootstrap > /dev/null; then
              echo "Application démarrée"
              exit 0
            fi
            sleep 2
          done
          echo "L'application n'a pas démarré à temps"
          cat app.log
          exit 1

      - name: Installer Newman
        run: npm install -g newman

      - name: Exécuter la collection Postman
        run: newman run postman/smoke.postman_collection.json --env-var baseUrl=http://127.0.0.1:8080

      - name: Afficher les logs en cas d'échec
        if: failure()
        run: cat app.log

      - name: Arrêter l'application
        if: always()
        run: |
          kill $(cat app.pid) || true
  sonar:
    needs: smoke-test
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Rendre gradlew exécutable
        run: chmod +x ./gradlew

      - name: Analyse Sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar