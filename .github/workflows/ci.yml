name: CI Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Rendre gradlew exécutable
        run: chmod +x ./gradlew

      - name: Compilation
        run: ./gradlew clean assemble

      - name: Tests unitaires
        run: ./gradlew test

  smoke-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Rendre gradlew exécutable
        run: chmod +x ./gradlew

      - name: Construire le jar
        run: ./gradlew clean bootJar

      - name: Démarrer l’application
        run: |
          java -jar build/libs/*.jar > app.log 2>&1 &
          echo $! > app.pid

      - name: Attendre que l’application démarre
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/api/ui/bootstrap > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Application non démarrée"
          cat app.log
          exit 1

      - name: Installer Newman
        run: npm install -g newman

      - name: Lancer les smoke tests Postman
        run: newman run postman/smoke.postman_collection.json --env-var baseUrl=http://127.0.0.1:8080

      - name: Arrêter l’application
        if: always()
        run: |
          kill $(cat app.pid) || true