plugins {
    id 'java'
    id 'application'
    id 'jacoco'
    id 'org.sonarqube' version "7.2.3.7755"
}

group = 'com.example'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

application {
    mainClass = 'com.example.sftp.SftpServerApp'
}

repositories {
    mavenCentral()
}

ext {
    sshdVersion = '2.13.0'
}

dependencies {
    // Apache MINA SSHD - Core + SFTP
    implementation "org.apache.sshd:sshd-core:${sshdVersion}"
    implementation "org.apache.sshd:sshd-sftp:${sshdVersion}"
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'

    // Logging
    implementation 'ch.qos.logback:logback-classic:1.4.14'

    // Tests
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'com.jcraft:jsch:0.1.55'
}

sonar {
    properties {
        property "sonar.projectKey", "kadt2022_mon-premier-projet"
        property "sonar.organization", "kadt2022"
        property "sonar.host.url", "https://sonarcloud.io"
    }
}

test {
    useJUnitPlatform()
    testLogging {
        events 'passed', 'skipped', 'failed'
    }
}

jacoco {
    toolVersion = '0.8.12'
}

def coverageExclusions = [
        'com/example/sftp/SftpServerApp.class',
        'com/example/sftp/LocalStorageSecurity.class'
]

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
    }
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: coverageExclusions)
        }))
    }
}

jacocoTestCoverageVerification {
    dependsOn test
    violationRules {
        rule {
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.80
            }
        }
    }
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: coverageExclusions)
        }))
    }
}

test.finalizedBy jacocoTestReport
check.dependsOn jacocoTestCoverageVerification

// CrÃƒÂ©e un fat-jar exÃƒÂ©cutable
jar {
    manifest {
        attributes 'Main-Class': application.mainClass
    }
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
